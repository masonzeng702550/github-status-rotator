name: rotate-status

on:
  schedule:
    - cron: "0 * * * *"  # hourly
  workflow_dispatch:

permissions: {}

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: set status
        env:
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
          STATUS_EXPIRY_MIN: "65"
          STATUS_BUSY: "false"
        run: python scripts/set_status.py
