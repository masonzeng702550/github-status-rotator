name: rotate-status

on:
  schedule:
    - cron: "0 * * * *"  # hourly
  workflow_dispatch:

permissions: {}

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: set status
        env:
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
          STATUS_EXPIRY_MIN: "65"
          STATUS_BUSY: "false"
        run: |
          if [ -z "$STATUS_TOKEN" ]; then
            echo "STATUS_TOKEN secret not set — skipping. This is expected on the template repo itself; set the secret on your fork/instance to enable."
            exit 0
          fi
          python scripts/set_status.py
